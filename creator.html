<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Creator — SOTA Birthday Wishes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-main: #06080f;
      --bg-panel: #0f1320;
      --bg-hover: #161d30;
      --border-color: #1a2240;
      --accent: #3b82f6;
      --text-main: #f0f4ff;
      --text-muted: #8b9cc0;
      --pink: #f43f5e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── TOP HEADER ─── */
    .header {
      height: 60px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }
    .header-title h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #3b82f6, #818cf8, #f43f5e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .toolbar-actions {
      display: flex; gap: 12px;
    }
    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn-primary { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover { background: #2563eb; }
    .btn-video { background: linear-gradient(135deg, #f43f5e, #e11d48); border: none; }
    .btn-video:hover { opacity: 0.9; }
    .recording-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      color: #f43f5e;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ─── MAIN LAYOUT ─── */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── SIDEBAR (LEFT) ─── */
    .sidebar {
      width: 300px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .search-input {
      width: 100%; padding: 10px 14px;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .style-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .style-item {
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .style-item:hover, .style-item.active {
      border-color: var(--accent);
    }
    .style-item h3 { font-size: 0.9rem; margin-bottom: 6px; }
    .variant-selector {
      display: flex; gap: 6px;
    }
    .variant-btn {
      flex: 1;
      font-size: 0.7rem;
      padding: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .variant-btn.active {
      background: rgba(59,130,246,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── WORKSPACE (CENTER) ─── */
    .workspace {
      flex: 1;
      background: #000; /* Darker background to contrast the card */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 40px 20px;
      position: relative;
    }
    
    /* ─── FLOATING CONTROLS ─── */
    .floating-controls {
      position: absolute;
      bottom: 30px;
      background: rgba(15,19,32,0.9);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 100px;
      border: 1px solid var(--border-color);
      display: flex;
      gap: 16px;
      z-index: 50;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .control-group {
      display: flex; align-items: center; gap: 8px;
      border-right: 1px solid var(--border-color);
      padding-right: 16px;
    }
    .control-group:last-child { border-right: none; padding-right: 0; }
    .control-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold;}
    
    /* ─── IFRAME CONTAINER ─── */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    #preview-frame {
      width: 100%;
      height: 1000px; /* high enough to avoid inner scroll */
      border: none;
      background: transparent;
      transition: width 0.3s;
    }
    
    /* Photo Upload Hidden Input */
    #photo-upload { display: none; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-title">
      <h1>SOTA Master Creator</h1>
    </div>
    <div class="recording-indicator" id="recordingIndicator">
      🔴 Recording Video...
    </div>
    <div class="toolbar-actions">
      <button class="btn" id="btn-dl-png">📸 Export PNG</button>
      <button class="btn" id="btn-dl-jpg">📸 Export JPG</button>
      <button class="btn btn-video" id="btn-dl-mp4">🎥 Export MP4 (Video)</button>
    </div>
  </header>

  <div class="main-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <input type="text" id="searchInput" class="search-input" placeholder="Search templates...">
      </div>
      <div class="style-list" id="styleList">
        <!-- Styles populated by JS -->
      </div>
    </aside>

    <main class="workspace" id="workspace">
      <div class="iframe-wrapper">
        <iframe id="preview-frame" src="about:blank"></iframe>
      </div>
      
      <div class="floating-controls" id="floatingControls">
        <div class="control-group">
          <span class="control-label">Aspect Ratio</span>
          <button class="btn ratio-btn" data-ratio="9 / 16">9:16</button>
          <button class="btn ratio-btn" data-ratio="1 / 1">1:1</button>
          <button class="btn ratio-btn" data-ratio="4 / 5">4:5</button>
        </div>
        <div class="control-group">
          <span class="control-label">Chapter Logo</span>
          <button class="btn chapter-btn" data-chapter="cis">CIS</button>
          <button class="btn chapter-btn" data-chapter="sps">SPS</button>
        </div>
      </div>
    </main>
  </div>
  
  <input type="file" id="photo-upload" accept="image/*">

  <script src="editor.js"></script>
</body>
</html>
