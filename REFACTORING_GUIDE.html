<!-- UPDATED CSS FOR SEMANTIC STRUCTURE -->
<!-- ============================================================ -->

<style>
  .portfolio-section {
    padding: 80px 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .portfolio-section h1 {
    margin-bottom: 40px;
    font-size: 2.5rem;
    font-weight: 700;
  }

  .portfolio-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    padding: 20px 0;
  }

  /* Semantic figure styling replaces .portfolio-item div styling */
  .portfolio-item {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    aspect-ratio: 1;
    margin: 0; /* Remove default figure margins */
    display: flex;
    flex-direction: column;
    background: #f5f5f5;
    transition: transform 0.3s ease;
  }

  .portfolio-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  }

  .portfolio-item img {
    width: 100%;
    height: 75%; /* Reserve space for caption */
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .portfolio-item:hover img {
    transform: scale(1.05);
  }

  .portfolio-item figcaption {
    height: 25%;
    padding: 12px;
    background: white;
    font-size: 0.875rem;
    font-weight: 500;
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    .portfolio-grid {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .portfolio-section h1 {
      font-size: 1.875rem;
    }
  }

  @media (max-width: 480px) {
    .portfolio-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .portfolio-section {
      padding: 40px 12px;
    }
  }
</style>

<!-- 1. Responsive image loading with srcset -->
<figure class="portfolio-item">
  <img 
    src="works/images/01.png"
    srcset="
      works/images/01-small.png 480w,
      works/images/01-medium.png 800w,
      works/images/01.png 1200w
    "
    sizes="(max-width: 480px) 100vw, (max-width: 768px) 50vw, 33vw"
    alt="Abstract geometric digital artwork"
    loading="lazy"
    width="400"
    height="400"
  >
  <figcaption>Abstract Geometric Artwork</figcaption>
</figure>

<!-- 2. WebP format with fallback -->
<figure class="portfolio-item">
  <picture>
    <source srcset="works/images/01.webp" type="image/webp">
    <source srcset="works/images/01.png" type="image/png">
    <img 
      src="works/images/01.png"
      alt="Abstract geometric digital artwork"
      loading="lazy"
      width="400"
      height="400"
    >
  </picture>
  <figcaption>Abstract Geometric Artwork</figcaption>
</figure>

<!-- 3. Intersection Observer for lazy loading -->
<script>
  const imageObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        img.src = img.dataset.src;
        img.classList.add('loaded');
        imageObserver.unobserve(img);
      }
    });
  });

  document.querySelectorAll('img[data-src]').forEach(img => {
    imageObserver.observe(img);
  });
</script>
